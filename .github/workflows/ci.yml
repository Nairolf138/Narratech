name: CI

on:
  push:
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Validate narrative schema fixture
        run: python main.py validate outputs/scene.json

      - name: Run core unit tests
        run: pytest tests/test_schema_validator.py tests/test_consistency_engine.py tests/test_pipeline_blocking.py

      - name: Run smoke pipeline test
        run: pytest tests/test_smoke_pipeline_mock.py -m smoke

      - name: Run full test suite with coverage
        run: |
          pytest \
            --cov=src/core \
            --cov=src/generation \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            --cov-fail-under=82

      - name: Enforce per-module coverage thresholds
        run: python tests/ci/check_coverage_thresholds.py

      - name: Run evaluation suite
        run: python scripts/run_evaluation_suite.py

      - name: Drift check (non-blocking)
        continue-on-error: true
        run: python tests/ci/check_evaluation_drift.py

      - name: Drift check (blocking)
        run: python tests/ci/check_evaluation_drift.py --strict
